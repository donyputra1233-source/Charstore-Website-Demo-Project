<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | CharacterHall.store</title>
    <link rel="stylesheet" href="/public/css/register.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <div class="logo-wrapper">
                    <img src="/assets/image/logo.png" alt="CharacterHall Logo" class="register-logo" onerror="this.src='https://placehold.co/60x60/6366f1/white?text=CH'">
                    <h1>Character<span class="highlight">Hall</span>.store</h1>
                </div>
                <p class="tagline">Daftar dan dapatkan reward awal senilai 10,000+ Koin!</p>
            </div>

            <form id="registerForm" class="register-form">
                <div class="input-group">
                    <label for="nama">
                        <i class="fas fa-user"></i>
                        Nama Lengkap
                    </label>
                    <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required>
                    <div class="input-error" id="namaError"></div>
                </div>

                <div class="input-group">
                    <label for="username">
                        <i class="fas fa-user-tag"></i>
                        Username
                    </label>
                    <input type="text" id="username" name="username" placeholder="Masukkan username" required>
                    <div class="input-error" id="usernameError"></div>
                </div>

                <div class="input-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" id="email" name="email" placeholder="Masukkan email" required>
                    <div class="input-error" id="emailError"></div>
                </div>

                <div class="input-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Kata Sandi
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Masukkan kata sandi" required>
                        <button type="button" class="toggle-password" data-target="password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="input-error" id="passwordError"></div>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">
                        <i class="fas fa-check-circle"></i>
                        Konfirmasi Kata Sandi
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Konfirmasi kata sandi" required>
                        <button type="button" class="toggle-password" data-target="confirmPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="input-error" id="confirmError"></div>
                </div>

                <div class="reward-info">
                    <div class="reward-badge">
                        <i class="fas fa-gift"></i>
                        Reward Pendaftaran:
                    </div>
                    <div class="reward-items">
                        <span class="reward-item gold">
                            <i class="fas fa-coins"></i> 10,000 Koin Emas
                        </span>
                        <span class="reward-item purple">
                            <i class="fas fa-gem"></i> 100 Dark Crystal
                        </span>
                        <span class="reward-item red">
                            <i class="fas fa-crown"></i> 10 Ruby
                        </span>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="termsCheckbox" required>
                        <span class="checkmark"></span>
                        Saya setuju dengan <a href="#" id="termsLink">Syarat & Ketentuan</a>
                    </label>
                </div>

                <button type="submit" class="btn-register" id="registerBtn">
                    <i class="fas fa-user-plus"></i>
                    Daftar Sekarang
                </button>

                <div class="login-prompt">
                    <p>Sudah punya akun? <a href="login.html">Masuk Disini</a></p>
                </div>
            </form>

            <div class="register-footer">
                <p>© 2025 CharacterHall.store - Tempat Terkaya Karakter & Wafiu</p>
            </div>
        </div>

        <div class="register-bg-effects">
            <div class="floating-gift"><i class="fas fa-gift"></i></div>
            <div class="floating-gift"><i class="fas fa-coins"></i></div>
            <div class="floating-gift"><i class="fas fa-gem"></i></div>
            <div class="floating-gift"><i class="fas fa-crown"></i></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="../js/register.js"></script>
</body>
</html>
