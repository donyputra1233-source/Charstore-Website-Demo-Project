<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CharacterHall.store</title>
    <link rel="stylesheet" href="/public/css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-wrapper">
                    <img src="/assets/image/logo.png" alt="CharacterHall Logo" class="login-logo" onerror="this.src='https://placehold.co/60x60/6366f1/white?text=CH'">
                    <h1>Character<span class="highlight">Hall</span>.store</h1>
                </div>
                <p class="tagline">Login untuk mengakses kekayaanmu</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="username">
                        <i class="fas fa-user"></i>
                        Nama Pengguna
                    </label>
                    <input type="text" id="username" name="username" placeholder="Masukkan nama pengguna" required autocomplete="username">
                    <div class="input-error" id="usernameError"></div>
                </div>

                <div class="input-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Kata Sandi
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Masukkan kata sandi" required autocomplete="current-password">
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="input-error" id="passwordError"></div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        Ingat saya
                    </label>
                    <a href="#" class="forgot-link" id="forgotPassword">Lupa kata sandi?</a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-arrow-right-to-bracket"></i>
                    Masuk
                </button>

                <div class="register-prompt">
                    <p>Pertama kali? <a href="register.html" id="registerLink">Klik Disini</a></p>
                </div>
            </form>

            <div class="login-footer">
                <p>© 2025 CharacterHall.store - Tempat Terkaya Karakter & Wafiu</p>
            </div>
        </div>

        <div class="login-bg-effects">
            <div class="floating-coin"><i class="fas fa-coins"></i></div>
            <div class="floating-coin"><i class="fas fa-gem"></i></div>
            <div class="floating-coin"><i class="fas fa-crown"></i></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="/public/js/login.js"></script>
</body>
</html>
