<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CharacterHall.store</title>
    <link rel="icon" type="image/png" href="../../assets/image/logo/web.png">
    <link rel="stylesheet" href="../css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo dan Header -->
            <div class="login-header">
                <img src="../../assets/image/logo/web.png" alt="CharacterHall Logo" class="login-logo">
                <h1>CharacterHall.<span class="highlight">store</span></h1>
                <p class="subtitle">Masuk ke akunmu</p>
            </div>

            <!-- Form Login -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i> Nama / Username
                    </label>
                    <input type="text" id="username" name="username" placeholder="Masukan Nama atau Username" required autocomplete="username">
                    <div class="error-message" id="usernameError"></div>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Kata Sandi
                    </label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Masukan Kata Sandi" required autocomplete="current-password">
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="error-message" id="passwordError"></div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Masuk
                </button>
            </form>

            <!-- Footer Link -->
            <div class="login-footer">
                <p>Pertama kali ? <a href="#" id="registerLink">Klik Disini</a></p>
            </div>

            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay" style="display: none;">
                <div class="spinner"></div>
                <p>Memverifikasi...</p>
            </div>
        </div>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
