<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Karakter - CharacterHall.store</title>
    <link rel="icon" type="image/png" href="../../assets/image/logo/web.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/detail.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo-area">
            <img src="../../assets/image/logo/web.png" alt="CharacterHall Logo">
            <div>
                <h1>CharacterHall.<span class="highlight">store</span></h1>
                <p class="tagline">Trade karakter mu disini demi kekayaan</p>
            </div>
        </div>
        <div class="user-area">
            <div class="user-info" id="userInfo">
                <i class="fas fa-user-circle"></i>
                <span id="userName">Loading...</span>
                <span class="level-badge" id="userLevel">Lv.0</span>
            </div>
            <a href="market.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Kembali
            </a>
            <a href="home.html" class="home-btn">
                <i class="fas fa-home"></i> Home
            </a>
            <a href="../page/login.html" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Keluar
            </a>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="main-container">
        <div class="detail-container" id="detailContainer">
            <div class="loading-state">
                <i class="fas fa-spinner fa-pulse"></i>
                <p>Memuat detail karakter...</p>
            </div>
        </div>
    </div>

    <!-- Modal Konfirmasi -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-question-circle"></i> Konfirmasi Pembelian</h3>
                <a href="#" class="modal-close">&times;</a>
            </div>
            <div class="modal-body" id="confirmModalBody">
                <!-- Konten konfirmasi akan diisi JS -->
            </div>
        </div>
    </div>

    <!-- Alert Notifikasi -->
    <div id="alertContainer"></div>

    <script src="../js/detail.js"></script>
</body>
</html>
