<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CharacterHall.store</title>
    <link rel="icon" type="image/png" href="../../assets/image/logo/web.png">
    <link rel="stylesheet" href="../css/register.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <!-- Logo dan Header -->
            <div class="register-header">
                <img src="../../assets/image/logo/web.png" alt="CharacterHall Logo" class="register-logo">
                <h1>CharacterHall.<span class="highlight">store</span></h1>
                <p class="subtitle">Daftar akun baru dan dapatkan bonus!</p>
            </div>

            <!-- Bonus Info -->
            <div class="bonus-info">
                <div class="bonus-title">
                    <i class="fas fa-gift"></i> Bonus Pendaftaran
                </div>
                <div class="bonus-items">
                    <div class="bonus-item">
                        <i class="fas fa-coins"></i>
                        <span>120.000G</span>
                        <small>Koin Emas</small>
                    </div>
                    <div class="bonus-item">
                        <i class="fas fa-gem"></i>
                        <span>10.000DR</span>
                        <small>Dark Ruby</small>
                    </div>
                    <div class="bonus-item">
                        <i class="fas fa-mountain"></i>
                        <span>9.000AD</span>
                        <small>Andesite Dust</small>
                    </div>
                    <div class="bonus-item">
                        <i class="fas fa-crown"></i>
                        <span>100CS</span>
                        <small>Stonecaller</small>
                    </div>
                    <div class="bonus-item">
                        <i class="fas fa-puzzle-piece"></i>
                        <span>0CF</span>
                        <small>Card Fragments</small>
                    </div>
                </div>
            </div>

            <!-- Form Register -->
            <form id="registerForm" class="register-form">
                <div class="form-group">
                    <label for="fullname">
                        <i class="fas fa-user-circle"></i> Nama Lengkap
                    </label>
                    <input type="text" id="fullname" name="fullname" placeholder="Masukan Nama Lengkap" required autocomplete="name">
                    <div class="error-message" id="fullnameError"></div>
                </div>

                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user-tag"></i> Username
                    </label>
                    <input type="text" id="username" name="username" placeholder="Masukan Username" required autocomplete="username">
                    <div class="error-message" id="usernameError"></div>
                    <div class="hint-text">Username akan digunakan untuk login</div>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Kata Sandi
                    </label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Masukan Kata Sandi" required autocomplete="new-password">
                        <button type="button" class="toggle-password" data-target="password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="error-message" id="passwordError"></div>
                    <div class="hint-text">Minimal 6 karakter</div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">
                        <i class="fas fa-check-circle"></i> Konfirmasi Kata Sandi
                    </label>
                    <div class="password-input-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Konfirmasi Kata Sandi" required>
                        <button type="button" class="toggle-password" data-target="confirmPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="error-message" id="confirmError"></div>
                </div>

                <button type="submit" class="btn-register" id="registerBtn">
                    <i class="fas fa-user-plus"></i> Daftar Sekarang
                </button>
            </form>

            <!-- Footer Link -->
            <div class="register-footer">
                <p>Sudah punya akun? <a href="login.html">Masuk Disini</a></p>
            </div>

            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loadingOverlay" style="display: none;">
                <div class="spinner"></div>
                <p>Mendaftarkan akun...</p>
            </div>
        </div>
    </div>

    <script src="../js/register.js"></script>
</body>
</html>
